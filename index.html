<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nada ❤️</title>

<style>
  :root {
    --primary-color: #ff4d6d;
    --bg-dark: #0f0f1a;
  }

  body {
    background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* التاريخ والتحية */
  .top-info {
    position: absolute;
    top: 20px;
    width: 90%;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 1px;
  }

  /* تأثير القرص الموسيقي */
  .music-container {
    margin-bottom: 20px;
    position: relative;
  }

  .disc {
    width: 120px;
    height: 120px;
    background: url('https://cdn-icons-png.flaticon.com/512/1041/1041042.png') no-repeat center;
    background-size: cover;
    border-radius: 50%;
    border: 3px solid #333;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: transform 0.5s ease;
    animation: spin 3s linear infinite;
    animation-play-state: paused; /* يشتغل بس من تشتغل الموسيقى */
  }

  .disc.playing {
    animation-play-state: running;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* الكارد */
  .card {
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    width: 85%;
    max-width: 400px;
    z-index: 10;
  }

  h2 { font-size: 32px; margin-bottom: 10px; color: var(--primary-color); }
  
  #text {
    font-size: 20px;
    min-height: 60px;
    margin: 20px 0;
    line-height: 1.6;
    transition: all 0.3s ease;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  button {
    padding: 12px;
    border: none;
    border-radius: 15px;
    background: var(--primary-color);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
  }

  button:hover { transform: scale(1.05); background: #ff758c; }
  
  .btn-music { background: #4a4e69; }

  /* الخلفية المتحركة */
  .heart {
    position: absolute;
    color: var(--primary-color);
    animation: float 5s linear infinite;
    z-index: 1;
  }

  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .center-text {
    position: absolute;
    font-size: 10vw;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.03);
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>

<body>
