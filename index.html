<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For Nada ❤️</title>

<style>
body {
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

/* فوق */
.top-right {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 14px;
  opacity: 0.7;
}

.top-left {
  position: absolute;
  top: 10px;
  left: 20px;
  font-size: 14px;
  opacity: 0.7;
}

/* الكارد */
.card {
  margin-top: 120px;
  background: rgba(255,255,255,0.07);
  padding: 30px;
  border-radius: 20px;
  display: inline-block;
  backdrop-filter: blur(10px);
}

h2 {
  font-size: 28px;
}

#text {
  font-size: 22px;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* قلوب */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* S&N */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  opacity: 0.05;
}
</style>
</head>

<body>

<div class="top-right">2025/10/8 ❤️</div>
<div class="top-left">أبو السين يرسل تحياته 😏</div>

<div class="center-text">S&N ❤️</div>

<div class="card">
<h2>ندى ❤️</h2>
<p id="text">لا تضغطين بسرعة 😏</p>
<button onclick="next()">Next</button>
<br>
<button onclick="playMusic()">🎵 شغلي الأغنية</button>
</div>

<audio id="music" loop>
  <source src="PUT-MP3-HERE" type="audio/mpeg">
</audio>

<script>
let messages = [
"أوكي خل نبدي 😏",
"وجودج يخلي يومي حلو... مرات 😂",
"بس حتى بهالمرات... أحبها لأن بيها أنتي ❤️",
"صرتي جزء من يومي... بدونج أحس شي ناقص",
"مو دايماً أگولها... بس وجودج يفرق هواي وياي",
"شوي تخليني أنغث منج 🤨",
"بس بنفس الوقت... فدوة إلج 😏❤️",
"وأحس لو غبتي... كلشي يصير ممل",
"أحب سوالفج... حتى الغثيثة 😂",
"وأحب وجودج بكل تفاصيل يومي",
"بالمختصر...",
"أحبج مو طبيعي",
"أحبج موت ❤️",
"وإذا وصلتي لهنا...",
"هذا يعني أنتي هم مهتمة 😏",
"و بعد شنو تريدين مني؟ 😔❤️",
"وكل عام وانتي بخير يا أحلى ندى ❤️🎉"
];

let i = 0;

function next(){
  if(i < messages.length){
    document.getElementById("text").innerText = messages[i];
    i++;
  }
}

// تشغيل الصوت
function playMusic(){
  document.getElementById("music").play();
}

// قلوب
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 25) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
